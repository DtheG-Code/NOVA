<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<title>Neuer Tab</title>
<link rel="stylesheet" href="/fonts.css" />
<style>
:root {
  --bg: #05050c;
  --text: #eef0fa;
  --text-2: #9aa0bb;
  --text-3: #5c6279;
  --acc: #00e5ff;
  --acc2: #7c4dff;
  --font: 'Space Grotesk', 'Segoe UI', sans-serif;
  --font-disp: 'Orbitron', sans-serif;
  --ease: cubic-bezier(0.33, 1, 0.4, 1);
  --spring: cubic-bezier(0.3, 1.45, 0.45, 1);
}
* { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font);
  color: var(--text);
  background:
    radial-gradient(1100px 700px at 85% -10%, color-mix(in srgb, var(--acc2) 14%, transparent), transparent 60%),
    radial-gradient(900px 700px at -5% 110%, color-mix(in srgb, var(--acc) 11%, transparent), transparent 60%),
    var(--bg);
  display: flex; align-items: center; justify-content: center;
}
#stars { position: fixed; inset: -40px; z-index: 0; will-change: transform; }
#cruise { position: fixed; inset: 0; z-index: 0; display: none; }
body.cruise #stars { display: none; }
body.cruise #cruise { display: block; }
/* Bei der Space-Szene den Lese-Schleier zurücknehmen — nur ein dezenter Mittel-Halo
   für die Uhr/Suche, damit das All-Bild voll zur Geltung kommt. */
body.cruise #scrim {
  background:
    radial-gradient(85% 55% at 50% 40%, rgba(2,2,8,0.62) 0%, rgba(2,2,8,0.34) 36%, transparent 66%),
    linear-gradient(to bottom, rgba(2,2,8,0.28) 0%, transparent 26%, transparent 72%, rgba(2,2,8,0.4) 100%);
}
/* Lesbarkeits-Schleier: dunkelt die Bildmitte hinter Uhr & Suche ab */
#scrim {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(120% 80% at 50% 44%, rgba(2,2,8,0.78) 0%, rgba(2,2,8,0.52) 32%, rgba(2,2,8,0.12) 62%, transparent 80%),
    linear-gradient(to bottom, rgba(2,2,8,0.35) 0%, transparent 30%, transparent 60%, rgba(2,2,8,0.55) 100%);
}

.weather {
  position: fixed; top: 22px; right: 26px; z-index: 2;
  display: flex; align-items: center; gap: 13px;
  padding: 11px 18px;
  border-radius: 16px;
  background:
    linear-gradient(135deg, color-mix(in srgb, var(--acc) 16%, transparent), transparent 70%),
    rgba(8, 8, 18, 0.62);
  border: 1px solid color-mix(in srgb, var(--acc) 30%, transparent);
  box-shadow: 0 10px 34px rgba(0, 0, 0, 0.45), 0 0 26px color-mix(in srgb, var(--acc) 12%, transparent);
  backdrop-filter: blur(22px) saturate(1.25);
  color: var(--text);
  animation: rise 0.7s 0.3s var(--ease) both;
}
.weather .w-ic {
  width: 30px; height: 30px; flex: none;
  stroke: var(--acc); stroke-width: 1.8; fill: none;
  stroke-linecap: round; stroke-linejoin: round;
  filter: drop-shadow(0 0 8px color-mix(in srgb, var(--acc) 45%, transparent));
}
.w-text { display: flex; flex-direction: column; gap: 2px; line-height: 1.15; }
.w-line1 { display: flex; align-items: baseline; gap: 7px; }
.weather b { color: #fff; font-weight: 700; font-size: 18px; letter-spacing: 0.3px; }
.weather .w-label { color: var(--text); font-size: 12.5px; font-weight: 500; }
.weather .city {
  display: inline-flex; align-items: center; gap: 4px;
  color: color-mix(in srgb, var(--acc) 55%, #ffffff);
  font-size: 11.5px; font-weight: 600; letter-spacing: 0.2px;
}
.weather .city svg { width: 11px; height: 11px; stroke: currentColor; stroke-width: 2; fill: none; }

.wrap {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center; gap: 28px;
  width: min(860px, 92vw);
  will-change: transform;
}

.clock {
  font-family: var(--font-disp);
  font-size: clamp(64px, 11vw, 118px);
  font-weight: 700;
  letter-spacing: 6px;
  line-height: 1;
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
  font-feature-settings: "tnum" 1;
  background: linear-gradient(120deg, var(--acc), var(--acc2));
  -webkit-background-clip: text; background-clip: text; color: transparent;
  filter: drop-shadow(0 0 30px color-mix(in srgb, var(--acc) 45%, transparent))
          drop-shadow(0 2px 14px rgba(0,0,0,0.5));
  animation: rise 0.7s var(--ease) both;
}
/* Sekunden mit fester Breite, damit die Uhr nicht hin- und herwandert */
.clock .sec {
  display: inline-block;
  font-size: 0.30em; font-weight: 600; letter-spacing: 2px;
  vertical-align: super;
  min-width: 1.7em; text-align: left;
  margin-left: 0.14em;
  /* eigene, garantiert sichtbare Farbe (unabhängig vom geklippten Gradient) */
  -webkit-text-fill-color: var(--acc);
  color: var(--acc);
  opacity: 0.95;
  filter: drop-shadow(0 0 12px color-mix(in srgb, var(--acc) 60%, transparent));
}
.date {
  font-size: 14px; letter-spacing: 3.5px; text-transform: uppercase; color: var(--text);
  text-align: center; margin-top: 14px; opacity: 0.92;
  text-shadow: 0 2px 12px rgba(0,0,0,0.7);
  animation: rise 0.7s 0.06s var(--ease) both;
}
.greet {
  font-size: 21px; font-weight: 500;
  text-shadow: 0 2px 14px rgba(0,0,0,0.6);
  animation: rise 0.7s 0.1s var(--ease) both;
}
.greet b {
  background: linear-gradient(120deg, var(--acc), var(--acc2));
  -webkit-background-clip: text; background-clip: text; color: transparent;
  font-weight: 700;
}

.search-wrap { position: relative; width: min(640px, 88vw); animation: rise 0.7s 0.14s var(--ease) both; }
.search {
  width: 100%;
  height: 54px;
  display: flex; align-items: center; gap: 13px;
  padding: 0 20px;
  border-radius: 17px;
  background: rgba(255, 255, 255, 0.045);
  border: 1px solid rgba(255, 255, 255, 0.09);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(20px);
  transition: all 0.22s var(--ease);
}
.search-wrap.open .search, .search:focus-within {
  border-color: color-mix(in srgb, var(--acc) 45%, transparent);
  background: rgba(8, 8, 18, 0.75);
  box-shadow: 0 0 0 4px color-mix(in srgb, var(--acc) 10%, transparent),
              0 20px 54px rgba(0, 0, 0, 0.5),
              0 0 44px color-mix(in srgb, var(--acc) 12%, transparent);
  transform: translateY(-2px);
}
.search svg { width: 18px; height: 18px; stroke: var(--text-3); stroke-width: 2; fill: none; stroke-linecap: round; flex: none; }
.search:focus-within svg { stroke: var(--acc); }
.search input {
  flex: 1; background: none; border: none; outline: none;
  font-family: inherit; font-size: 15.5px; color: var(--text);
  user-select: text;
}
.search input::placeholder { color: var(--text-3); }
/* Such- & KI-Agent-Button rechts in der Suchleiste */
.agent-btn {
  flex: none; width: 34px; height: 34px; padding: 0;
  display: grid; place-items: center; cursor: pointer;
  border-radius: 10px; border: 1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.05);
  transition: all 0.18s var(--ease);
}
.agent-btn svg { width: 19px; height: 19px; stroke: var(--text-3); stroke-width: 1.9; fill: none; stroke-linecap: round; stroke-linejoin: round; }
#agent-btn { margin-left: -6px; margin-right: -5px; }   /* dicht an den Pfeil koppeln (ein Paar) */
/* normaler Such-Button (Pfeil): neutral */
.agent-btn.nrm:hover { border-color: var(--border-2); background: rgba(255,255,255,0.11); transform: translateY(-1px); }
.agent-btn.nrm:hover svg { stroke: var(--text); }
/* KI-Agent-Button (Roboter): Akzent */
#agent-btn:hover {
  border-color: color-mix(in srgb, var(--acc) 55%, transparent);
  background: color-mix(in srgb, var(--acc) 16%, transparent);
  transform: translateY(-1px);
}
#agent-btn:hover svg { stroke: var(--acc); }
#agent-btn.busy {
  border-color: var(--acc);
  background: color-mix(in srgb, var(--acc) 26%, transparent);
  animation: agentPulse 1.1s ease-in-out infinite;
}
#agent-btn.busy svg { stroke: #fff; }
@keyframes agentPulse {
  0%,100% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--acc) 45%, transparent); }
  50% { box-shadow: 0 0 0 6px color-mix(in srgb, var(--acc) 0%, transparent); }
}

.sugg {
  position: absolute; top: calc(100% + 8px); left: 0; right: 0; z-index: 60;
  border-radius: 15px;
  background: #07070f;
  border: 1px solid rgba(255, 255, 255, 0.14);
  box-shadow: 0 26px 70px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(0,0,0,0.4),
              0 0 40px color-mix(in srgb, var(--acc) 14%, transparent);
  padding: 6px;
  display: none;
  animation: rise 0.16s var(--spring) both;
}
.sugg.open { display: block; }
.sugg-row {
  display: flex; align-items: center; gap: 11px;
  height: 40px; padding: 0 13px;
  border-radius: 10px;
  cursor: pointer;
  color: var(--text); font-size: 14px;
}
.sugg-row svg { width: 14px; height: 14px; stroke: var(--text-3); stroke-width: 2; fill: none; stroke-linecap: round; flex: none; }
.sugg-row.sel { background: color-mix(in srgb, var(--acc) 22%, transparent); color: #fff; }
.sugg-row.sel svg { stroke: var(--acc); }

/* Beim Tippen die Kacheln ausblenden, damit die Vorschläge klar lesbar sind */
.dials, .statline { transition: opacity 0.2s var(--ease), transform 0.2s var(--ease); }
body.searching .dials, body.searching .statline {
  opacity: 0; pointer-events: none; transform: translateY(8px);
}

.dials {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(88px, 110px));
  justify-content: center;
  gap: 13px;
  width: 100%;
  animation: rise 0.7s 0.18s var(--ease) both;
}
.dial {
  position: relative;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  padding: 17px 6px 13px;
  border-radius: 17px;
  background: rgba(255, 255, 255, 0.035);
  border: 1px solid rgba(255, 255, 255, 0.07);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
  cursor: pointer;
  text-decoration: none; color: var(--text-2);
  transition: all 0.18s var(--spring);
}
.dial:hover {
  transform: translateY(-4px);
  background: color-mix(in srgb, var(--acc) 9%, rgba(255,255,255,0.03));
  border-color: color-mix(in srgb, var(--acc) 32%, transparent);
  box-shadow: 0 16px 36px rgba(0, 0, 0, 0.45), 0 0 26px color-mix(in srgb, var(--acc) 15%, transparent);
  color: var(--text);
}
.dial img, .dial .letter { width: 26px; height: 26px; border-radius: 7px; }
.dial .letter {
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 13px;
  background: color-mix(in srgb, var(--acc) 18%, transparent);
  color: var(--acc);
}
.dial span {
  font-size: 11px; max-width: 100%;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.dial .pin-dot {
  position: absolute; top: 7px; left: 9px;
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--acc);
  box-shadow: 0 0 6px var(--acc);
  opacity: 0.7;
}
.dial .rm {
  position: absolute; top: 5px; right: 5px;
  width: 19px; height: 19px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255, 77, 109, 0.14);
  color: #ff4d6d;
  border: none; cursor: pointer;
  opacity: 0; transition: opacity 0.15s;
  font-size: 11px; line-height: 1;
}
.dial:hover .rm { opacity: 1; }
.dial.add {
  border-style: dashed; color: var(--text-3);
  justify-content: center; gap: 6px;
}
.dial.add .plus { font-size: 22px; line-height: 1; font-weight: 300; }
.dial.add:hover { color: var(--acc); }

.addform {
  display: none;
  position: fixed; inset: 0; z-index: 10;
  background: rgba(3, 3, 9, 0.6);
  backdrop-filter: blur(14px);
  align-items: center; justify-content: center;
}
.addform.open { display: flex; }
.addform .box {
  width: min(380px, 90vw);
  border-radius: 18px;
  background: rgba(10, 10, 21, 0.98);
  border: 1px solid rgba(255, 255, 255, 0.13);
  box-shadow: 0 30px 90px rgba(0, 0, 0, 0.75);
  padding: 20px;
  display: flex; flex-direction: column; gap: 11px;
  animation: rise 0.2s var(--spring) both;
}
.addform h3 { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
.addform input {
  height: 40px; padding: 0 13px;
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.13);
  border-radius: 11px;
  outline: none; font-size: 13.5px; color: var(--text);
  font-family: inherit;
  user-select: text;
}
.addform input:focus { border-color: color-mix(in srgb, var(--acc) 45%, transparent); }
.addform .row { display: flex; gap: 9px; justify-content: flex-end; margin-top: 4px; }
.addform button {
  height: 36px; padding: 0 17px;
  border-radius: 11px; border: none; cursor: pointer;
  font-family: inherit; font-size: 13px; font-weight: 500;
  background: rgba(255, 255, 255, 0.07); color: var(--text-2);
}
.addform button.go {
  background: linear-gradient(120deg, var(--acc), var(--acc2));
  color: #fff; font-weight: 600;
  box-shadow: 0 2px 18px color-mix(in srgb, var(--acc) 35%, transparent);
}

.statline {
  display: flex; align-items: center; gap: 9px;
  font-size: 12px; color: var(--text-3);
  padding: 8px 18px;
  border-radius: 99px;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.06);
  animation: rise 0.7s 0.24s var(--ease) both;
}
.statline svg { width: 13px; height: 13px; stroke: var(--acc); stroke-width: 2; fill: none; stroke-linejoin: round; }
.statline b { color: var(--acc); font-weight: 600; }

@keyframes rise { from { opacity: 0; transform: translateY(18px); } }
</style>
</head>
<body>
<svg style="display:none" xmlns="http://www.w3.org/2000/svg">
  <symbol id="w-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4.2"/><path d="M12 2.5v2M12 19.5v2M2.5 12h2M19.5 12h2M5 5l1.4 1.4M17.6 17.6L19 19M19 5l-1.4 1.4M6.4 17.6L5 19"/></symbol>
  <symbol id="w-psun" viewBox="0 0 24 24"><circle cx="8" cy="7.5" r="2.8"/><path d="M8 2.5V4M2.5 7.5H4M4 3.5l1 1M12 3.5l-1 1M17.5 21H8.5a4 4 0 0 1-.6-7.95A5 5 0 0 1 17.5 12a4.5 4.5 0 0 1 0 9z"/></symbol>
  <symbol id="w-cloud" viewBox="0 0 24 24"><path d="M17.5 19H7a4 4 0 0 1-.7-7.93A5.5 5.5 0 0 1 17 9.6 4.2 4.2 0 0 1 17.5 19z"/></symbol>
  <symbol id="w-fog" viewBox="0 0 24 24"><path d="M17.5 13.5H7a4 4 0 0 1-.7-7.9A5.5 5.5 0 0 1 17 4.2a4.2 4.2 0 0 1 .5 9.3M5 17h14M7 20.5h10"/></symbol>
  <symbol id="w-rain" viewBox="0 0 24 24"><path d="M17.5 15H7a4 4 0 0 1-.7-7.93A5.5 5.5 0 0 1 17 5.6 4.2 4.2 0 0 1 17.5 15zM8.5 18v2.5M12.5 18v2.5M16.5 18v2.5"/></symbol>
  <symbol id="w-snow" viewBox="0 0 24 24"><path d="M17.5 15H7a4 4 0 0 1-.7-7.93A5.5 5.5 0 0 1 17 5.6 4.2 4.2 0 0 1 17.5 15zM8.5 18.5h.01M12.5 20.5h.01M16.5 18.5h.01M10.5 21.5h.01M14.5 18h.01"/></symbol>
  <symbol id="w-storm" viewBox="0 0 24 24"><path d="M17.5 13.5H7a4 4 0 0 1-.7-7.9A5.5 5.5 0 0 1 17 4.2a4.2 4.2 0 0 1 .5 9.3M12.5 13l-2.5 4.5h3L10.5 22"/></symbol>
</svg>
<canvas id="stars"></canvas>
<canvas id="cruise"></canvas>
<div id="scrim"></div>

<div class="weather" id="weather" style="display:none">
  <svg class="w-ic"><use id="w-use" href="#w-sun"/></svg>
  <div class="w-text">
    <div class="w-line1"><b id="w-temp"></b> <span class="w-label" id="w-label"></span></div>
    <span class="city"><svg viewBox="0 0 24 24"><path d="M12 21s-7-6.3-7-11a7 7 0 0 1 14 0c0 4.7-7 11-7 11z"/><circle cx="12" cy="10" r="2.4"/></svg><span id="w-city"></span></span>
  </div>
</div>

<div class="wrap" id="wrap">
  <div>
    <div class="clock" id="clock">--:--</div>
    <div class="date" id="date"></div>
  </div>
  <div class="greet" id="greet"></div>

  <div class="search-wrap" id="search-wrap">
    <form class="search" id="form">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="q" type="text" placeholder="Das Web durchsuchen …" autofocus autocomplete="off" />
      <button type="button" id="search-btn" class="agent-btn nrm" title="Normale Suche">
        <svg viewBox="0 0 24 24"><path d="M4 12h15"/><path d="M13 6l6 6-6 6"/></svg>
      </button>
      <button type="button" id="agent-btn" class="agent-btn" title="KI-Agent: Aufgabe automatisch von NOVA erledigen lassen">
        <svg viewBox="0 0 24 24"><rect x="4.5" y="8" width="15" height="11.5" rx="3.2"/><path d="M12 4.4V8"/><circle cx="12" cy="3.1" r="1.5"/><circle cx="9.3" cy="13.6" r="1.35"/><circle cx="14.7" cy="13.6" r="1.35"/><path d="M9.4 16.6h5.2"/><path d="M2.4 12.5v3M21.6 12.5v3"/></svg>
      </button>
    </form>
    <div class="sugg" id="sugg"></div>
  </div>

  <div class="dials" id="dials"></div>

  <div class="statline" id="stat" style="display:none">
    <svg viewBox="0 0 24 24"><path d="M12 3l8 3v6c0 4.5-3.4 7.8-8 9-4.6-1.2-8-4.5-8-9V6z"/></svg>
    <span><b id="blocked">0</b>&nbsp;Werbeanzeigen &amp; Tracker geblockt</span>
  </div>
</div>

<div class="addform" id="addform">
  <div class="box">
    <h3>Verknüpfung hinzufügen</h3>
    <input id="add-name" type="text" placeholder="Name" maxlength="30" />
    <input id="add-url" type="text" placeholder="https://…" />
    <div class="row">
      <button id="add-cancel" type="button">Abbrechen</button>
      <button class="go" id="add-save" type="button">Hinzufügen</button>
    </div>
  </div>
</div>

<script>
const ENGINES = {
  google: 'https://www.google.com/search?q=',
  ddg: 'https://duckduckgo.com/?q=',
  bing: 'https://www.bing.com/search?q=',
  brave: 'https://search.brave.com/search?q=',
};
const WMO = {
  0: ['w-sun', 'Klar'], 1: ['w-psun', 'Heiter'], 2: ['w-psun', 'Bewölkt'], 3: ['w-cloud', 'Bedeckt'],
  45: ['w-fog', 'Nebel'], 48: ['w-fog', 'Raureif'],
  51: ['w-rain', 'Niesel'], 53: ['w-rain', 'Niesel'], 55: ['w-rain', 'Niesel'],
  56: ['w-rain', 'Eisregen'], 57: ['w-rain', 'Eisregen'],
  61: ['w-rain', 'Regen'], 63: ['w-rain', 'Regen'], 65: ['w-rain', 'Starkregen'],
  66: ['w-rain', 'Eisregen'], 67: ['w-rain', 'Eisregen'],
  71: ['w-snow', 'Schnee'], 73: ['w-snow', 'Schnee'], 75: ['w-snow', 'Starker Schnee'], 77: ['w-snow', 'Schneekörner'],
  80: ['w-rain', 'Schauer'], 81: ['w-rain', 'Schauer'], 82: ['w-storm', 'Starke Schauer'],
  85: ['w-snow', 'Schneeschauer'], 86: ['w-snow', 'Schneeschauer'],
  95: ['w-storm', 'Gewitter'], 96: ['w-storm', 'Gewitter'], 99: ['w-storm', 'Hagelgewitter'],
};

// Uhr — feststehend, mit Sekunden (Sekundenfeld hat feste Breite)
function tick() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2, '0');
  const mm = String(now.getMinutes()).padStart(2, '0');
  const ss = String(now.getSeconds()).padStart(2, '0');
  const clock = document.getElementById('clock');
  // Nur die Sekunden aktualisieren, falls Struktur schon existiert (kein Layout-Sprung)
  let secEl = clock.querySelector('.sec');
  if (!secEl) {
    clock.textContent = `${hh}:${mm}`;
    secEl = document.createElement('span');
    secEl.className = 'sec';
    clock.appendChild(secEl);
  } else {
    clock.firstChild.textContent = `${hh}:${mm}`;
  }
  secEl.textContent = ss;
  document.getElementById('date').textContent =
    now.toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}
tick();
setInterval(tick, 1000);

// ============================================================ WebGL 3D-Hintergrund
// Volumetrische Nebel-/Galaxie-Szene mit HiDPI-Rendering (ultra scharf),
// HDR-Tonemapping, Maus-Parallax und Akzentfarben. Fällt bei Bedarf auf ein
// klassisches Starfield zurück.
const canvas = document.getElementById('stars');
let glOK = false;
let setSceneAccent = () => {};
let setSceneMouse = () => {};

function initNebula(quality) {
  if (quality === 'low') { canvas.style.display = 'none'; glOK = false; return; }   // LOW = nur CSS-Hintergrund, kein GPU
  const gl = canvas.getContext('webgl', { antialias: quality === 'high', alpha: false, premultipliedAlpha: false, powerPreference: 'high-performance' })
          || canvas.getContext('experimental-webgl');
  if (!gl) { start2DFallback(); return; }
  const OCT = quality === 'high' ? 6 : 4;                              // fbm-Oktaven (Detailtiefe)
  const DEFS = '#define FBM_OCT ' + OCT + '\n' + (quality === 'high' ? '#define PLANETS\n' : '');
  const DPR_CAP = quality === 'high' ? 2.0 : 1.25;                     // Auflösungs-Skalierung
  const MIN_DELTA = quality === 'high' ? 0 : 33;                       // FPS-Cap: mid ~30fps, high ungedrosselt

  const VERT = `attribute vec2 p; void main(){ gl_Position = vec4(p, 0.0, 1.0); }`;
  const FRAG = `
  precision highp float;
  uniform vec2 uRes;
  uniform float uTime;
  uniform vec2 uMouse;
  uniform vec3 uAcc;
  uniform vec3 uAcc2;
  uniform float uWarp;

  float hash(vec2 p){ p = fract(p * vec2(123.34, 456.21)); p += dot(p, p + 45.32); return fract(p.x * p.y); }
  float noise(vec2 p){
    vec2 i = floor(p), f = fract(p);
    float a = hash(i), b = hash(i + vec2(1.0,0.0)), c = hash(i + vec2(0.0,1.0)), d = hash(i + vec2(1.0,1.0));
    vec2 u = f * f * (3.0 - 2.0 * f);
    return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);
  }
  float fbm(vec2 p){
    float v = 0.0, a = 0.55;
    mat2 m = mat2(1.6, 1.2, -1.2, 1.6);
    for(int i = 0; i < FBM_OCT; i++){ v += a * noise(p); p = m * p; a *= 0.5; }
    return v;
  }
  // Sparse, scharf gerenderte Sterne mit Funkeln
  float starLayer(vec2 uv, float density, float t){
    vec2 g = floor(uv * density);
    vec2 f = fract(uv * density) - 0.5;
    float h = hash(g);
    float present = step(0.972, h);
    float d = length(f);
    float tw = 0.6 + 0.4 * sin(t * 2.0 + h * 40.0);
    float core = smoothstep(0.06, 0.0, d) * tw;
    float halo = smoothstep(0.34, 0.0, d) * 0.25 * tw;
    return present * (core + halo);
  }
  // ACES-ähnliches Tonemapping für den HDR-Look
  vec3 aces(vec3 x){
    return clamp((x*(2.51*x+0.03))/(x*(2.43*x+0.59)+0.14), 0.0, 1.0);
  }
  // Beleuchteter Planet (3D-Kugel-Look mit Terminator, Rim-Light & Oberflächen-Textur)
  vec3 planet(vec2 uv, vec2 center, float rad, vec3 base, vec3 lightDir, inout float cov){
    vec2 d = uv - center;
    float dist = length(d);
    if (dist > rad * 1.6) return vec3(0.0);
    // z aus Kugelgleichung -> Normale
    float z2 = rad*rad - dot(d, d);
    vec3 col = vec3(0.0);
    if (z2 > 0.0){
      float z = sqrt(z2);
      vec3 n = normalize(vec3(d, z));
      float diff = clamp(dot(n, normalize(lightDir)), 0.0, 1.0);
      // Oberflächendetails
      float surf = fbm((d / rad) * 4.0 + center * 10.0);
      vec3 c = base * (0.25 + surf * 0.5);
      col = c * (0.12 + diff * 1.25);
      // Rim-Light an der Kante
      float rim = pow(1.0 - clamp(z / rad, 0.0, 1.0), 3.0);
      col += mix(uAcc, uAcc2, 0.5) * rim * 0.6;
      float edge = smoothstep(rad, rad - rad*0.04, dist);
      cov = max(cov, edge);
      col *= edge;
    }
    // weicher Atmosphären-Glow
    float atmo = smoothstep(rad * 1.5, rad, dist) * 0.5;
    col += mix(base, uAcc, 0.4) * atmo * (1.0 - cov);
    return col;
  }
  void main(){
    vec2 uv = (gl_FragCoord.xy - 0.5 * uRes) / uRes.y;
    vec2 m = uMouse * 0.12;
    float t = uTime * 0.05;

    // Hyperspace-Warp: zieht die Koordinaten radial in Streifen
    float warp = uWarp;
    if (warp > 0.001){
      float ang = atan(uv.y, uv.x);
      float rad0 = length(uv);
      rad0 = pow(rad0, 1.0 - warp * 0.6);
      uv = vec2(cos(ang), sin(ang)) * rad0;
    }

    // Leichte Rotation + Parallax
    float ca = cos(t * 0.3), sa = sin(t * 0.3);
    vec2 ruv = mat2(ca, -sa, sa, ca) * (uv + m);

    // Volumetrischer Nebel (zwei bewegte fbm-Schichten)
    vec2 q = ruv * 1.6;
    float n1 = fbm(q + vec2(t * 0.6, t * 0.2));
    float n2 = fbm(q * 2.1 - vec2(t * 0.3, t * 0.5) + n1);
    float neb = pow(smoothstep(0.15, 1.05, n1 * 0.7 + n2 * 0.6), 1.6);

    // Farbverlauf zwischen den Akzenten, moduliert durch das Rauschen
    vec3 col = mix(uAcc, uAcc2, clamp(n2 * 1.2, 0.0, 1.0));
    col *= neb * 1.35;

    // Zentrales Kern-Leuchten (galaktisches Zentrum)
    float r = length(uv + m * 0.5);
    float glow = exp(-r * 2.6) * 0.9;
    col += mix(uAcc2, uAcc, 0.5) * glow;

    // Dünne Akzent-Streifen (Aurora)
    float band = fbm(vec2(ruv.x * 1.2 + t, ruv.y * 3.0)) ;
    col += uAcc * smoothstep(0.55, 0.95, band) * neb * 0.5;

    // Sterne (mehrere Dichten für Tiefe)
    vec2 suv = uv + m * 1.4;
    float starBoost = 1.0 + warp * 6.0;
    float stars = starLayer(suv, 9.0, uTime)
                + starLayer(suv * 1.7 + 31.4, 16.0, uTime) * 0.8
                + starLayer(suv * 2.6 + 71.1, 26.0, uTime) * 0.6;
    col += vec3(0.85, 0.92, 1.0) * stars * 1.4 * starBoost;

    // ---- Planeten (langsam driftend) — bei Warp ausgeblendet (nur Qualität HIGH)
    #ifdef PLANETS
    float planetFade = 1.0 - smoothstep(0.0, 0.4, warp);
    if (planetFade > 0.01){
      vec3 pcol = vec3(0.0);
      float cov = 0.0;
      vec2 par = m * 0.6;
      // großer Planet links unten
      vec2 c1 = vec2(-0.92 + sin(uTime*0.03)*0.03, -0.46 + cos(uTime*0.025)*0.03) + par;
      pcol += planet(uv, c1, 0.30, mix(uAcc2, vec3(0.4,0.45,0.7), 0.5), vec3(0.7,0.5,0.6), cov);
      // mittlerer Planet rechts oben
      float cov2 = 0.0;
      vec2 c2 = vec2(0.95 + cos(uTime*0.02)*0.02, 0.54 + sin(uTime*0.03)*0.02) + par*1.3;
      vec3 ring = planet(uv, c2, 0.17, mix(uAcc, vec3(0.8,0.7,0.5), 0.4), vec3(-0.6,0.4,0.6), cov2);
      // Saturn-artiger Ring
      vec2 rd = (uv - c2);
      float rr = length(vec2(rd.x, rd.y*2.6));
      float ringMask = smoothstep(0.30, 0.28, rr) * smoothstep(0.21, 0.23, rr) * (1.0 - cov2);
      ring += mix(uAcc, uAcc2, 0.5) * ringMask * 0.7;
      pcol += ring;
      // kleiner ferner Planet
      float cov3 = 0.0;
      vec2 c3 = vec2(0.45 + sin(uTime*0.04)*0.04, -0.62) + par*0.8;
      pcol += planet(uv, c3, 0.075, vec3(0.5,0.55,0.75), vec3(0.5,0.6,0.5), cov3) * 0.9;
      col = mix(col, col + pcol, planetFade);
      col = mix(col, pcol, max(cov, max(cov2, cov3)) * 0.92 * planetFade);
    }
    #endif

    // Tiefes Basis-Schwarz + Vignette
    vec3 base = vec3(0.02, 0.02, 0.05);
    col += base;
    float vig = smoothstep(1.25, 0.25, length(uv));
    col *= mix(0.55, 1.0, vig);

    // Warp-Aufhellung Richtung Zentrum
    col += mix(uAcc, vec3(1.0), 0.4) * warp * exp(-r * 1.5) * 1.6;

    // Filmkorn gegen Banding
    float grain = (hash(gl_FragCoord.xy + uTime) - 0.5) * 0.025;
    col += grain;

    col = aces(col * (1.15 + warp * 0.6));
    gl_FragColor = vec4(col, 1.0);
  }`;

  function compile(type, src){
    const sh = gl.createShader(type);
    gl.shaderSource(sh, src);
    gl.compileShader(sh);
    if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) { console.error(gl.getShaderInfoLog(sh)); return null; }
    return sh;
  }
  const vs = compile(gl.VERTEX_SHADER, VERT);
  const fs = compile(gl.FRAGMENT_SHADER, DEFS + FRAG);
  if (!vs || !fs) { start2DFallback(); return; }
  const prog = gl.createProgram();
  gl.attachShader(prog, vs); gl.attachShader(prog, fs); gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) { console.error(gl.getProgramInfoLog(prog)); start2DFallback(); return; }
  gl.useProgram(prog);

  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
  const loc = gl.getAttribLocation(prog, 'p');
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

  const uRes = gl.getUniformLocation(prog, 'uRes');
  const uTime = gl.getUniformLocation(prog, 'uTime');
  const uMouse = gl.getUniformLocation(prog, 'uMouse');
  const uAcc = gl.getUniformLocation(prog, 'uAcc');
  const uAcc2 = gl.getUniformLocation(prog, 'uAcc2');
  const uWarp = gl.getUniformLocation(prog, 'uWarp');

  let acc = [0, 0.9, 1], acc2 = [0.49, 0.3, 1];
  let mx = 0, my = 0, tmx = 0, tmy = 0;
  setSceneAccent = (a, b) => { acc = a; acc2 = b; };
  setSceneMouse = (x, y) => { tmx = x; tmy = y; };

  function resizeGL(){
    const dpr = Math.min(devicePixelRatio || 1, DPR_CAP);   // Auflösungs-Skalierung je Qualität
    const w = Math.floor((innerWidth + 80) * dpr);
    const h = Math.floor((innerHeight + 80) * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w; canvas.height = h;
      gl.viewport(0, 0, w, h);
    }
  }
  resizeGL();
  addEventListener('resize', resizeGL);

  const start = performance.now();
  let paused = false, lastFrame = 0, rafId = 0;
  function render(now){
    if (paused) { rafId = 0; return; }            // Tab unsichtbar → Loop stoppt (spart GPU bei vielen Tabs)
    rafId = requestAnimationFrame(render);
    if (MIN_DELTA && now - lastFrame < MIN_DELTA) return;   // FPS-Cap
    lastFrame = now;
    resizeGL();
    mx += (tmx - mx) * 0.05; my += (tmy - my) * 0.05;
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uTime, (performance.now() - start) / 1000);
    gl.uniform2f(uMouse, mx, my);
    gl.uniform3fv(uAcc, acc);
    gl.uniform3fv(uAcc2, acc2);
    gl.uniform1f(uWarp, 0.0);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
  }
  // KEY: backgroundThrottling=no → Hintergrund-Tabs würden weiterrendern. Daher manuell bei Unsichtbarkeit pausieren.
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) { paused = true; }
    else if (!rafId) { paused = false; lastFrame = 0; rafId = requestAnimationFrame(render); }
  });
  paused = document.hidden;
  if (!paused) rafId = requestAnimationFrame(render);
  glOK = true;
}

// CSS-Hexfarbe -> linearer RGB-Vektor (für korrekte HDR-Mischung)
function hexToLinear(hex){
  hex = (hex || '').trim().replace('#', '');
  if (hex.length === 3) hex = hex.split('').map((c) => c + c).join('');
  const r = parseInt(hex.slice(0,2),16)/255, g = parseInt(hex.slice(2,4),16)/255, b = parseInt(hex.slice(4,6),16)/255;
  const lin = (c) => (isNaN(c) ? 0 : Math.pow(c, 2.2));
  return [lin(r), lin(g), lin(b)];
}
function syncSceneAccent(){
  const cs = getComputedStyle(document.documentElement);
  const a = cs.getPropertyValue('--acc') || '#00e5ff';
  const b = cs.getPropertyValue('--acc2') || '#7c4dff';
  setSceneAccent(hexToLinear(a), hexToLinear(b));
}
// Akzentfarbe anwenden (Standardpaletten + Custom) und Szene live umfärben
const NT_ACCENTS = {
  cyan: ['#00e5ff', '#7c4dff'], violet: ['#a78bfa', '#ec4899'], magenta: ['#f471b5', '#7c3aed'],
  lime: ['#a3e635', '#22d3ee'], amber: ['#fbbf24', '#fb7185'], ice: ['#7dd3fc', '#818cf8'],
};
function applyNtAccent(accent, custom){
  let a1, a2;
  if (accent === 'custom' && custom) { a1 = custom.a || '#00e5ff'; a2 = custom.b || '#7c4dff'; }
  else { const p = NT_ACCENTS[accent] || NT_ACCENTS.cyan; a1 = p[0]; a2 = p[1]; }
  document.documentElement.style.setProperty('--acc', a1);
  document.documentElement.style.setProperty('--acc2', a2);
  syncSceneAccent();
}
syncSceneAccent();

// Fallback: leichtes 2D-Starfield, falls WebGL nicht verfügbar ist (pausiert bei unsichtbarem Tab)
function start2DFallback() {
  glOK = false;
  const ctx = canvas.getContext('2d'); if (!ctx) return;
  canvas.style.display = 'block';
  let stars = [], paused = false, rafId = 0;
  function resize2d() {
    canvas.width = (innerWidth + 80) * devicePixelRatio;
    canvas.height = (innerHeight + 80) * devicePixelRatio;
    stars = Array.from({ length: Math.min(170, innerWidth / 9) }, () => ({
      x: Math.random() * canvas.width, y: Math.random() * canvas.height,
      r: (Math.random() * 1.1 + 0.3) * devicePixelRatio,
      s: Math.random() * 0.22 + 0.04, p: Math.random() * Math.PI * 2,
    }));
  }
  resize2d();
  addEventListener('resize', resize2d);
  function loop(t) {
    if (paused) { rafId = 0; return; }
    rafId = requestAnimationFrame(loop);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const st of stars) {
      st.y -= st.s; if (st.y < -4) st.y = canvas.height + 4;
      const tw = 0.45 + 0.55 * Math.abs(Math.sin(t / 1400 + st.p));
      ctx.globalAlpha = tw * 0.7; ctx.fillStyle = '#cfe9ff';
      ctx.beginPath(); ctx.arc(st.x, st.y, st.r, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) { paused = true; }
    else if (!rafId) { paused = false; rafId = requestAnimationFrame(loop); }
  });
  paused = document.hidden;
  if (!paused) rafId = requestAnimationFrame(loop);
}

let px = 0, py = 0;
addEventListener('mousemove', (e) => {
  const nx = (e.clientX / innerWidth - 0.5);
  const ny = (e.clientY / innerHeight - 0.5);
  px += (nx - px) * 0.08; py += (ny - py) * 0.08;
  setSceneMouse(nx, -ny);
  if (!glOK) canvas.style.transform = `translate(${px * -16}px, ${py * -16}px)`;
  // Inhalt (Uhr, Suche) bleibt fest stehen — nur der Hintergrund bewegt sich.
});

/* ===================== Cinematic Space Flight (Plugin) =====================
   Canvas-2D-Flug durchs All: 3D-Sternenstream, Nebel (HDR-Glow), Sonne + Lens-Flare,
   Planeten mit Atmosphäre/Ring, vorbeifliegende Asteroiden und ein Raumschiff im
   Vordergrund mit pulsierenden Triebwerken. An → ersetzt das Standard-Universum. */
const cruise = (() => {
  const cv = document.getElementById('cruise');
  const ctx = cv.getContext('2d');
  let W = 0, H = 0, DPR = 1, cx = 0, cy = 0, FOCAL = 900;
  let running = false, raf = 0, last = 0, T = 0;
  let stars = [], rocks = [], planets = [], nebs = [];
  let acc = [125, 211, 252], acc2 = [154, 107, 255];
  const FAR = 1400, SPREAD = 2200;

  const rnd = (a, b) => a + Math.random() * (b - a);
  const toRGB = (h) => { h = (h || '').trim().replace('#', ''); if (h.length === 3) h = h.split('').map((c) => c + c).join(''); const n = parseInt(h, 16); return [(n >> 16) & 255, (n >> 8) & 255, n & 255]; };
  const rgba = (c, a) => 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',' + a + ')';
  function readAccent() { const cs = getComputedStyle(document.documentElement); acc = toRGB(cs.getPropertyValue('--acc') || '#7dd3fc'); acc2 = toRGB(cs.getPropertyValue('--acc2') || '#9a6bff'); }

  function resize() {
    DPR = Math.min(devicePixelRatio || 1, 2); W = innerWidth; H = innerHeight;
    cv.width = Math.floor(W * DPR); cv.height = Math.floor(H * DPR); ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    cx = W * 0.5; cy = H * 0.46; FOCAL = Math.max(640, W * 0.62);
  }
  const project = (x, y, z) => [cx + (x / z) * FOCAL, cy + (y / z) * FOCAL];

  function makeRock() {
    const n = 7 + Math.floor(Math.random() * 5), verts = [];
    for (let i = 0; i < n; i++) { const a = i / n * 6.283; const r = rnd(0.6, 1); verts.push([Math.cos(a) * r, Math.sin(a) * r]); }
    return { x: rnd(-SPREAD, SPREAD), y: rnd(-SPREAD, SPREAD), z: rnd(200, FAR), rot: rnd(0, 6.28), spin: rnd(-0.5, 0.5), size: rnd(26, 64), verts, craters: Array.from({ length: 3 }, () => [rnd(-0.4, 0.4), rnd(-0.4, 0.4), rnd(0.08, 0.2)]) };
  }
  function build() {
    resize(); readAccent();
    stars = []; const N = Math.min(440, Math.floor(W * H / 3200));
    for (let i = 0; i < N; i++) stars.push({ x: rnd(-SPREAD, SPREAD), y: rnd(-SPREAD, SPREAD), z: rnd(1, FAR), c: Math.random() < 0.22 });
    rocks = Array.from({ length: 7 }, makeRock);
    // Planeten in natürlichen Farben → mehr „echte" 4K-Varianz (Nebel/Triebwerke nutzen den Akzent)
    planets = [
      { depth: 0.05, x: rnd(0, W), y: H * 0.52, r: Math.max(220, W * 0.22), hue: [120, 110, 200], ring: false, faint: true },
      { depth: 0.12, x: rnd(0, W), y: H * 0.26, r: Math.max(130, W * 0.13), hue: [232, 168, 96], ring: true, faint: false },   // Gasriese mit Ring
      { depth: 0.22, x: rnd(0, W), y: H * 0.74, r: Math.max(70, W * 0.075), hue: [86, 150, 236], ring: false, faint: false },   // blaue Murmel
    ];
    nebs = Array.from({ length: 5 }, (_, i) => ({ x: rnd(0, W), y: rnd(0, H), r: rnd(W * 0.32, W * 0.62), col: i % 2 ? acc : acc2, a: rnd(0.10, 0.20), dx: rnd(-4, 4), dy: rnd(-3, 3), ph: rnd(0, 6.28) }));
  }

  function drawNebs(dt) {
    ctx.globalCompositeOperation = 'lighter';
    for (const n of nebs) {
      n.x += n.dx * dt * 0.012; n.y += n.dy * dt * 0.012; n.ph += dt * 0.0004;
      if (n.x < -n.r) n.x = W + n.r; if (n.x > W + n.r) n.x = -n.r; if (n.y < -n.r) n.y = H + n.r; if (n.y > H + n.r) n.y = -n.r;
      const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
      g.addColorStop(0, rgba(n.col, n.a * (0.8 + 0.2 * Math.sin(n.ph)))); g.addColorStop(1, rgba(n.col, 0));
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    }
    ctx.globalCompositeOperation = 'source-over';
  }
  function drawSun() {
    const sx = W * 0.8, sy = H * 0.24;
    ctx.globalCompositeOperation = 'lighter';
    let g = ctx.createRadialGradient(sx, sy, 0, sx, sy, 190);
    g.addColorStop(0, 'rgba(255,255,255,0.95)'); g.addColorStop(0.22, rgba(acc, 0.5)); g.addColorStop(1, rgba(acc, 0));
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(sx, sy, 190, 0, 6.283); ctx.fill();
    for (let i = 1; i <= 4; i++) { const fx = sx + (cx - sx) * (i * 0.28), fy = sy + (cy - sy) * (i * 0.28), fr = 16 + i * 11; const fg = ctx.createRadialGradient(fx, fy, 0, fx, fy, fr); fg.addColorStop(0, rgba(i % 2 ? acc : acc2, 0.16)); fg.addColorStop(1, rgba(acc, 0)); ctx.fillStyle = fg; ctx.beginPath(); ctx.arc(fx, fy, fr, 0, 6.283); ctx.fill(); }
    ctx.globalCompositeOperation = 'source-over';
  }
  function drawPlanet(p, dt) {
    p.x -= p.depth * dt * 0.85; if (p.x < -p.r * 1.7) p.x = W + p.r * 1.7;
    const lx = -0.45, ly = -0.5;
    ctx.globalCompositeOperation = 'lighter';
    let ag = ctx.createRadialGradient(p.x, p.y, p.r * 0.8, p.x, p.y, p.r * 1.3);
    ag.addColorStop(0, rgba(p.hue, 0)); ag.addColorStop(0.5, rgba(p.hue, p.faint ? 0.05 : 0.18)); ag.addColorStop(1, rgba(p.hue, 0));
    ctx.fillStyle = ag; ctx.beginPath(); ctx.arc(p.x, p.y, p.r * 1.3, 0, 6.283); ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
    if (p.ring) { ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(-0.4); ctx.scale(1, 0.32); ctx.strokeStyle = rgba(p.hue, 0.22); ctx.lineWidth = p.r * 0.13; ctx.beginPath(); ctx.arc(0, 0, p.r * 1.5, Math.PI, 6.283); ctx.stroke(); ctx.restore(); }
    let sg = ctx.createRadialGradient(p.x + p.r * lx, p.y + p.r * ly, p.r * 0.1, p.x, p.y, p.r);
    sg.addColorStop(0, p.faint ? rgba(p.hue, 0.5) : 'rgba(255,255,255,0.92)');
    sg.addColorStop(0.4, rgba(p.hue, p.faint ? 0.32 : 0.85));
    sg.addColorStop(0.78, rgba([p.hue[0] * 0.3 | 0, p.hue[1] * 0.3 | 0, p.hue[2] * 0.3 | 0], p.faint ? 0.22 : 0.92));
    sg.addColorStop(1, 'rgba(4,4,12,' + (p.faint ? 0.5 : 0.96) + ')');
    ctx.fillStyle = sg; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 6.283); ctx.fill();
    if (p.ring) { ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(-0.4); ctx.scale(1, 0.32); ctx.strokeStyle = rgba(p.hue, 0.4); ctx.lineWidth = p.r * 0.13; ctx.beginPath(); ctx.arc(0, 0, p.r * 1.5, 0, Math.PI); ctx.stroke(); ctx.restore(); }
  }
  function drawStars(dt) {
    ctx.lineCap = 'round'; const v = dt * 0.22;
    for (const s of stars) {
      const [px, py] = project(s.x, s.y, s.z);
      s.z -= v * (0.5 + s.z / FAR * 1.3);
      if (s.z < 1) { s.x = rnd(-SPREAD, SPREAD); s.y = rnd(-SPREAD, SPREAD); s.z = FAR; continue; }
      const [nx, ny] = project(s.x, s.y, s.z);
      const d = 1 - s.z / FAR, a = Math.min(1, 0.12 + d * 0.95);
      ctx.strokeStyle = s.c ? rgba(acc, a) : 'rgba(226,238,255,' + a + ')';
      ctx.lineWidth = 0.3 + d * 1.9; ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(nx, ny); ctx.stroke();
    }
  }
  function drawRock(r, dt) {
    r.z -= dt * 0.16 * (0.5 + r.z / FAR); r.rot += r.spin * dt * 0.001;
    if (r.z < 1) { Object.assign(r, makeRock(), { z: FAR }); return; }
    const [sx, sy] = project(r.x, r.y, r.z), sc = (1 - r.z / FAR) * r.size * (FOCAL / 620);
    if (sc < 0.5) return;
    ctx.save(); ctx.translate(sx, sy); ctx.rotate(r.rot);
    const g = ctx.createLinearGradient(-sc, -sc, sc, sc); g.addColorStop(0, '#9298a4'); g.addColorStop(0.5, '#565b66'); g.addColorStop(1, '#23252d');
    ctx.fillStyle = g; ctx.beginPath();
    for (let i = 0; i < r.verts.length; i++) { const vx = r.verts[i][0] * sc, vy = r.verts[i][1] * sc; i ? ctx.lineTo(vx, vy) : ctx.moveTo(vx, vy); }
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(18,18,26,0.5)';
    for (const c of r.craters) { ctx.beginPath(); ctx.arc(c[0] * sc, c[1] * sc, c[2] * sc, 0, 6.283); ctx.fill(); }
    ctx.strokeStyle = rgba(acc, 0.22); ctx.lineWidth = Math.max(0.5, sc * 0.04); ctx.stroke();
    ctx.restore();
  }
  function drawShip() {
    const bob = Math.sin(T * 0.0011) * 8, roll = Math.sin(T * 0.0007) * 0.13, sway = Math.sin(T * 0.0009) * W * 0.04;
    const sx = cx + sway, sy = H * 0.64 + bob, S = Math.max(0.8, Math.min(1.7, W / 1180));
    ctx.save(); ctx.translate(sx, sy); ctx.rotate(roll); ctx.scale(S, S);
    ctx.globalCompositeOperation = 'lighter';
    const pulse = 0.72 + 0.28 * Math.sin(T * 0.008);
    for (const ex of [-16, 16]) {
      const g = ctx.createRadialGradient(ex, 64, 2, ex, 64, 48 * pulse); g.addColorStop(0, 'rgba(255,255,255,0.95)'); g.addColorStop(0.3, rgba(acc, 0.8)); g.addColorStop(1, rgba(acc, 0));
      ctx.fillStyle = g; ctx.beginPath(); ctx.ellipse(ex, 70, 17, 42 * pulse, 0, 0, 6.283); ctx.fill();
      const tg = ctx.createLinearGradient(ex, 60, ex, 190); tg.addColorStop(0, rgba(acc, 0.5)); tg.addColorStop(1, rgba(acc, 0)); ctx.fillStyle = tg; ctx.fillRect(ex - 4, 60, 8, 130);
    }
    ctx.globalCompositeOperation = 'source-over';
    const body = ctx.createLinearGradient(-30, 0, 30, 0); body.addColorStop(0, '#191c24'); body.addColorStop(0.5, '#b4bcc9'); body.addColorStop(1, '#191c24');
    ctx.fillStyle = body; ctx.beginPath(); ctx.moveTo(0, -66); ctx.lineTo(13, -10); ctx.lineTo(10, 58); ctx.lineTo(-10, 58); ctx.lineTo(-13, -10); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#2a3040'; ctx.beginPath(); ctx.moveTo(10, 2); ctx.lineTo(52, 46); ctx.lineTo(44, 56); ctx.lineTo(10, 40); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-10, 2); ctx.lineTo(-52, 46); ctx.lineTo(-44, 56); ctx.lineTo(-10, 40); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = rgba(acc, 0.9); ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(10, 40); ctx.lineTo(52, 46); ctx.moveTo(-10, 40); ctx.lineTo(-52, 46); ctx.stroke();
    const cg = ctx.createRadialGradient(0, -30, 1, 0, -30, 14); cg.addColorStop(0, rgba(acc, 1)); cg.addColorStop(1, rgba(acc, 0)); ctx.fillStyle = cg; ctx.beginPath(); ctx.ellipse(0, -30, 7, 16, 0, 0, 6.283); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.45)'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(0, -60); ctx.lineTo(0, 54); ctx.stroke();
    ctx.restore();
  }
  function drawVignette() {
    const g = ctx.createRadialGradient(cx, H * 0.5, H * 0.2, cx, H * 0.5, H * 0.9);
    g.addColorStop(0, 'rgba(0,0,0,0)'); g.addColorStop(1, 'rgba(0,0,6,0.62)'); ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  }
  function frame(ts) {
    if (!running) return;
    const dt = Math.min(50, ts - last || 16); last = ts; T = ts;
    const bg = ctx.createLinearGradient(0, 0, 0, H); bg.addColorStop(0, '#04050c'); bg.addColorStop(0.5, '#070611'); bg.addColorStop(1, '#02030a');
    ctx.globalCompositeOperation = 'source-over'; ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
    drawNebs(dt);
    drawPlanet(planets[0], dt);
    drawSun();
    drawStars(dt);
    drawPlanet(planets[1], dt); drawPlanet(planets[2], dt);
    for (const r of rocks) drawRock(r, dt);
    drawShip();
    drawVignette();
    raf = requestAnimationFrame(frame);
  }
  let enabled = false, built = false;
  function start() { if (running) return; if (!built) { build(); built = true; } running = true; last = performance.now(); raf = requestAnimationFrame(frame); }
  function stop() { running = false; cancelAnimationFrame(raf); ctx.clearRect(0, 0, cv.width, cv.height); }
  function setEnabled(on) { enabled = !!on; document.body.classList.toggle('cruise', enabled); if (enabled && !document.hidden) start(); else stop(); }
  // Bei unsichtbarem Tab pausieren (backgroundThrottling=no → würde sonst in allen Tabs weiterlaufen)
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) { running = false; cancelAnimationFrame(raf); }
    else if (enabled && !running) { running = true; last = performance.now(); raf = requestAnimationFrame(frame); }
  });
  addEventListener('resize', () => { if (running) { resize(); } });
  return { setEnabled, refreshAccent: () => { if (running) readAccent(); } };
})();

// Daten laden
let DATA = null;
let dials = [];

function host(url) { try { return new URL(url).hostname.replace(/^www\./, ''); } catch { return ''; } }

function renderDials() {
  const box = document.getElementById('dials');
  box.innerHTML = '';
  for (const site of dials) {
    const a = document.createElement('a');
    a.className = 'dial';
    a.href = site.url;
    const h = host(site.url);
    const img = document.createElement('img');
    img.src = `https://www.google.com/s2/favicons?domain=${h}&sz=64`;
    img.onerror = () => {
      const d = document.createElement('div');
      d.className = 'letter';
      d.textContent = (h[0] || '•').toUpperCase();
      img.replaceWith(d);
    };
    const label = document.createElement('span');
    label.textContent = (site.name && site.name !== site.url ? site.name : h).slice(0, 30);
    a.append(img, label);
    if (site.pinned) {
      const dot = document.createElement('i');
      dot.className = 'pin-dot';
      dot.title = 'Angepinnt';
      a.appendChild(dot);
    }
    const rm = document.createElement('button');
    rm.className = 'rm';
    rm.textContent = '✕';
    rm.title = site.pinned ? 'Verknüpfung entfernen' : 'Ausblenden';
    rm.addEventListener('click', async (e) => {
      e.preventDefault();
      e.stopPropagation();
      await window.novaPage?.removeDial({ url: site.url, pinned: !!site.pinned });
      dials = dials.filter((d) => d.url !== site.url);
      renderDials();
    });
    a.appendChild(rm);
    box.appendChild(a);
  }
  const add = document.createElement('div');
  add.className = 'dial add';
  add.innerHTML = '<span class="plus">+</span><span>Hinzufügen</span>';
  add.addEventListener('click', () => {
    document.getElementById('addform').classList.add('open');
    document.getElementById('add-name').focus();
  });
  box.appendChild(add);
}

document.getElementById('add-cancel').addEventListener('click', () => {
  document.getElementById('addform').classList.remove('open');
});
document.getElementById('addform').addEventListener('mousedown', (e) => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
});
document.getElementById('add-save').addEventListener('click', async () => {
  const name = document.getElementById('add-name').value.trim();
  let url = document.getElementById('add-url').value.trim();
  if (!url) return;
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  await window.novaPage?.addDial({ name, url });
  dials.unshift({ name: name || host(url), url, pinned: true });
  renderDials();
  document.getElementById('addform').classList.remove('open');
  document.getElementById('add-name').value = '';
  document.getElementById('add-url').value = '';
});
document.getElementById('add-url').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); document.getElementById('add-save').click(); }
});
addEventListener('keydown', (e) => {
  if (e.key === 'Escape') document.getElementById('addform').classList.remove('open');
});

// Suche + Vorschläge
const form = document.getElementById('form');
const q = document.getElementById('q');
const suggBox = document.getElementById('sugg');
let suggItems = [];
let suggSel = -1;
let suggSeq = 0;

function go(text) {
  const t = text.trim();
  if (!t) return;
  const engine = ENGINES[DATA?.searchEngine] || ENGINES.google;
  if (/^[a-z][a-z0-9+.-]*:\/\//i.test(t)) location.href = t;
  else if (!/\s/.test(t) && /\.[a-z]{2,}/i.test(t)) location.href = 'https://' + t;
  else location.href = engine + encodeURIComponent(t);
}

form.addEventListener('submit', (e) => {
  e.preventDefault();
  if (suggSel >= 0 && suggItems[suggSel]) go(suggItems[suggSel]);
  else go(q.value);
});

// ---- Agent-Modus: Ziel von NOVA automatisch erledigen lassen ----
const agentBtn = document.getElementById('agent-btn');
function runAgent() {
  const t = q.value.trim();
  if (!t) { q.focus(); agentBtn.classList.remove('busy'); return; }
  if (!window.novaPage || !window.novaPage.agent) return;
  closeSugg();
  window.novaPage.agent(t);          // → Host-Renderer → NOVA Operator (Hintergrund)
  agentBtn.classList.add('busy');
  // Kurzes Feedback; der Operator übernimmt diesen Tab gleich selbst.
  setTimeout(() => agentBtn.classList.remove('busy'), 2600);
}
agentBtn.addEventListener('click', (e) => { e.preventDefault(); runAgent(); });
// normaler Pfeil-Button = normale Suche
const searchBtn = document.getElementById('search-btn');
searchBtn.addEventListener('click', (e) => { e.preventDefault(); const t = q.value.trim(); if (t) go(t); else q.focus(); });
// Strg/⌘ + Enter in der Suchleiste = direkt als Agent-Ziel starten
q.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); runAgent(); }
});

q.addEventListener('input', async () => {
  const text = q.value.trim();
  const seq = ++suggSeq;
  if (text.length < 2 || !window.novaPage) { closeSugg(); return; }
  const res = await window.novaPage.suggest(text);
  if (seq !== suggSeq) return;
  suggItems = res || [];
  suggSel = -1;
  if (suggItems.length === 0) { closeSugg(); return; }
  suggBox.innerHTML = '';
  suggItems.forEach((s, i) => {
    const row = document.createElement('div');
    row.className = 'sugg-row';
    row.innerHTML = '<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>';
    const span = document.createElement('span');
    span.textContent = s;
    row.appendChild(span);
    row.addEventListener('mousedown', (e) => { e.preventDefault(); go(s); });
    row.addEventListener('mouseenter', () => { suggSel = i; paintSugg(); });
    suggBox.appendChild(row);
  });
  suggBox.classList.add('open');
  document.getElementById('search-wrap').classList.add('open');
  document.body.classList.add('searching');
});
q.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
    if (!suggItems.length) return;
    e.preventDefault();
    suggSel = (suggSel + (e.key === 'ArrowDown' ? 1 : -1) + suggItems.length + 1) % (suggItems.length + 1) - 1;
    if (suggSel === -1) suggSel = e.key === 'ArrowDown' ? 0 : suggItems.length - 1;
    paintSugg();
  } else if (e.key === 'Escape') {
    closeSugg();
  }
});
q.addEventListener('blur', () => setTimeout(closeSugg, 140));
function paintSugg() {
  [...suggBox.children].forEach((c, i) => c.classList.toggle('sel', i === suggSel));
}
function closeSugg() {
  suggBox.classList.remove('open');
  document.getElementById('search-wrap').classList.remove('open');
  document.body.classList.remove('searching');
  suggItems = [];
  suggSel = -1;
}

(async () => {
  try { DATA = await window.novaPage?.getData(); } catch {}
  if (!DATA) return;

  // GPU-Nebula starten — Qualität low (CSS) / mid (GPU leicht) / high (GPU stark)
  const nebQ = DATA.nebulaQuality || 'mid';
  initNebula(nebQ);
  // Live-Umschalten der Qualität (selten) → einfach neu laden, sauberer Neuaufbau des GL-Kontexts
  try { window.novaPage?.onNebula?.((q) => { if (q && q !== nebQ) location.reload(); }); } catch {}

  applyNtAccent(DATA.accent, DATA.customAccent);
  // Live-Umfärben, wenn die Akzentfarbe im Browser geändert wird (kein Neuladen nötig)
  try { window.novaPage?.onAccent((d) => { applyNtAccent(d.accent, d.customAccent); cruise.refreshAccent(); }); } catch {}

  // Cinematic-Space-Plugin: Startseiten-Animation umschalten (live)
  cruise.setEnabled(!!(DATA.plugins && DATA.plugins.cinematicSpace));
  try { window.novaPage?.onPlugins?.((native) => cruise.setEnabled(!!(native && native.cinematicSpace))); } catch {}

  const h = new Date().getHours();
  const greeting = h < 5 ? 'Gute Nacht' : h < 11 ? 'Guten Morgen' : h < 17 ? 'Guten Tag' : 'Guten Abend';
  document.getElementById('greet').innerHTML = `${greeting}, <b></b>.`;
  document.getElementById('greet').querySelector('b').textContent = DATA.name || '';

  if (DATA.weather) {
    const [iconId, label] = WMO[DATA.weather.code] || ['w-cloud', ''];
    document.getElementById('w-use').setAttribute('href', '#' + iconId);
    document.getElementById('w-temp').textContent = `${DATA.weather.temp}°C`;
    document.getElementById('w-label').textContent = label;
    document.getElementById('w-city').textContent = DATA.weather.city || '';
    document.getElementById('weather').style.display = '';
  }

  if (DATA.totalBlocked > 0) {
    document.getElementById('stat').style.display = '';
    document.getElementById('blocked').textContent = DATA.totalBlocked.toLocaleString('de-DE');
  }

  dials = DATA.dials || [];
  renderDials();

  // Speed-Dials live aktualisieren, wenn sie in einem anderen Tab geändert werden
  window.novaPage?.onDials?.((next) => { dials = next || []; renderDials(); });
})();
</script>
</body>
